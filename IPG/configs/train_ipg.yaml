data:
  train_sets:
    - name: "Market-1501-v15.09.15"
      ref_root: "/root/autodl-tmp/datasets/market1501_less/bounding_box_train_less"
      target_root: "/root/autodl-tmp/datasets/market1501_less/bounding_box_train_less"
      pose_root: "/root/autodl-tmp/datasets/market1501_less/bounding_box_train_less_pose"
      identity_mode: "filename"
      filename_delimiter: "_"
      filename_index: 0
  train_width: 512
  train_height: 256
  reid_width: 128
  reid_height: 256
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".webp"]
  ref_random_flip: true
  ref_random_erasing_prob: 0.5
  ref_random_erasing_on: "reid"
  allow_same_reference: false

features:
  part_reference_bank:
    enabled: true
    lambda_init: 0.0
    masks:
      ref_upper_root: "/root/autodl-tmp/datasets/market1501_less/sam3_part_masks/bounding_box_train_less/upper"
      ref_lower_root: "/root/autodl-tmp/datasets/market1501_less/sam3_part_masks/bounding_box_train_less/lower"
      target_upper_root: "/root/autodl-tmp/datasets/market1501_less/sam3_part_masks/bounding_box_train_less/upper"
      target_lower_root: "/root/autodl-tmp/datasets/market1501_less/sam3_part_masks/bounding_box_train_less/lower"
  color_structure:
    enabled: true
    color_json_path: "/root/autodl-fs/datasets/market1501/clothing_colors_less_nl.json"
    clip_model_path: null
    tokenizer_subfolder: "tokenizer"
    text_encoder_subfolder: "text_encoder"
    color_scale: 0.25
    # See configs/inference.yaml for full documentation. Defaults during
    # training are intentionally looser than inference: we let the model
    # see color signal across more sigma / layers so the cross-attention
    # weights can actually learn the color concept; the gating is then
    # tightened at inference time to suppress structural drift.
    timestep_max_sigma: -1
    min_layer_weight: 0.0
    hard_query_gating: false
    query_threshold: 0.5
  pose_loss:
    enabled: true
    weight: 0.01
    max_sigma: 0.25
    distance_iterations: 8

solver:
  train_batch_size: 4
  num_workers: 4
  gradient_accumulation_steps: 1
  mixed_precision: "fp16"
  enable_xformers_memory_efficient_attention: true
  gradient_checkpointing: false
  max_train_steps: 3000
  checkpointing_steps: 3000
  checkpoints_total_limit: 5
  max_grad_norm: 1.0
  learning_rate: 1.0e-5
  lr_warmup_steps: 500
  lr_scheduler: "constant_with_warmup"
  use_8bit_adam: false
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-2
  adam_epsilon: 1.0e-8

validation:
  enabled: false
  every_n_steps: 2000
  ref_dir: "./ref"
  pose_dir: "./standard_poses"
  num_inference_steps: 20
  guidance_scale: 3.5
  preview_width: 128
  preview_height: 256

reid:
  cfg_path: "./cfg_transreid.pkl"
  ckpt_path: "./pretrained/transformer_20.pth"
  num_classes: 751
  camera_num: 0
  view_num: 1

model:
  latent_scale: 0.18215
  ifr_input_dim: 3840
  ifr_num_tokens: 20
  ifr_hidden_dim: 768
  reference_unet_ckpt: null
  denoising_unet_ckpt: null
  pose_guider_ckpt: null
  ifr_ckpt: null
  part_bank_fusion_ckpt: null
  resume_from_checkpoint: null

logging:
  log_with: "tensorboard"
  # log_with: null
  project_dir: "tensorboard_runs"
  run_name: "ipg_train_test_log"

noise_scheduler_kwargs:
  num_train_timesteps: 1000
  beta_start: 0.00085
  beta_end: 0.012
  beta_schedule: "scaled_linear"
  steps_offset: 1
  clip_sample: false

base_model_path: "/root/autodl-tmp/stable-diffusion-v1-5"
vae_model_path: "/root/autodl-tmp/sd-vae-ft-mse"
output_dir: "/root/autodl-fs/ipg_trained_model_05-08"

weight_dtype: "fp16"  # [fp16, fp32, bf16]
uncond_ratio: 0.1
noise_offset: 0.05
snr_gamma: null
enable_zero_snr: false
seed: 12580
