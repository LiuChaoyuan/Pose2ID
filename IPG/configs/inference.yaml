data:
  train_width: 512
  train_height: 256
  sample_margin: 30

features:
  part_reference_bank:
    enabled: true
    lambda_init: 0.0
    masks:
      ref_upper_root: "/root/autodl-fs/datasets/market1501/sam3_part_masks"
      ref_lower_root: "/root/autodl-fs/datasets/market1501/sam3_part_masks"
      target_upper_root: "/root/autodl-fs/datasets/market1501/sam3_part_masks"
      target_lower_root: "/root/autodl-fs/datasets/market1501/sam3_part_masks"
  color_structure:
    enabled: true
    color_json_path: "/root/autodl-fs/datasets/market1501/clothing_colors_nl.json"
    clip_model_path: null
    tokenizer_subfolder: "tokenizer"
    text_encoder_subfolder: "text_encoder"
    color_scale: 0.25
    # Path 2: only inject color when noise level sigma <= threshold (~ low-noise
    # half of the schedule). Set to a negative value or null to disable.
    timestep_max_sigma: 0.5
    # Path 3: only inject color in transformer blocks whose attn_weight >=
    # threshold. attn_weight is in [0, 1], 0 = deepest/lowest-resolution layer,
    # 1 = shallowest/highest-resolution layer. 0.0 = inject in every block.
    min_layer_weight: 0.3
    # Path 4: hard-gate the color cross-attention by the body-part mask, so the
    # color tokens cannot influence queries outside the targeted region.
    hard_query_gating: true
    query_threshold: 0.5
  pose_loss:
    enabled: false
    weight: 0.05
    max_sigma: 0.35

solver:
  gradient_accumulation_steps: 1
  mixed_precision: 'fp16'
  enable_xformers_memory_efficient_attention: True 
  gradient_checkpointing: False
  max_train_steps: 20000
  max_grad_norm: 1.0
  # lr
  learning_rate: 1.0e-5
  scale_lr: False
  lr_warmup_steps: 1
  lr_scheduler: 'constant'

  # optimizer
  use_8bit_adam: False
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay:  1.0e-2
  adam_epsilon: 1.0e-8

noise_scheduler_kwargs:
  num_train_timesteps: 1000
  beta_start:          0.00085
  beta_end:            0.012
  beta_schedule:       "scaled_linear"
  steps_offset:        1
  clip_sample:         false

base_model_path: '/root/autodl-tmp/stable-diffusion-v1-5'
vae_model_path: '/root/autodl-tmp/sd-vae-ft-mse'

weight_dtype: 'fp16'  # [fp16, fp32]
uncond_ratio: 0.1
noise_offset: 0.05
snr_gamma: null
enable_zero_snr: False
pose_guider_pretrain: True

seed: 12580

